name: Daily Space Launch Data Sync

on:
  schedule:
    # 💡 AUTOMATION TRIGGER: Runs automatically every single day at 06:00 UTC (1:00 AM Madison local time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Keeps the manual play button in the GitHub dashboard as a backup

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v5

    # Native path routing prevents the server from issuing an HTML redirect
    - name: Fetch Global Launch Stream
      run: |
        curl -L -s -A "SpaceTrackerApp/1.0" \
        "https://ll.thespacedevs.com/2.3.0/launches/upcoming/?limit=100&mode=detailed&format=json" \
        -o launches.json

    # Fetches all astronauts currently in flight (in space)
    - name: Fetch Active Astronauts Stream
      run: |
        curl -L -s -A "SpaceTrackerApp/1.0" \
        "https://ll.thespacedevs.com/2.3.0/astronauts/?in_space=true&limit=100&mode=normal&format=json" \
        -o astronauts.json

    - name: Commit and push updated JSON data files
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add launches.json astronauts.json
        git diff-index --quiet HEAD || git commit -m "Automated update of global upcoming launches and active astronauts"
        git push
