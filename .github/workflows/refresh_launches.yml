name: Daily Space Launch Data Sync

on:
  schedule:
    # Runs automatically every single day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows you to press a "Run Workflow" button manually in GitHub to test it instantly

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run data fetch script
      run: python refresh.py

    - name: Commit and push updated launches.json file
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add launches.json
        # Only commit if the file actually changed to avoid empty log errors
        git diff-index --quiet HEAD || git commit -m "Automated update of upcoming space launches"
        git push

