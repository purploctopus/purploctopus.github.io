name: Daily Space Launch Data Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    # 1. Upgraded to v5 for Node 24 support
    - name: Checkout repository code
      uses: actions/checkout@v5

    # 2. Upgraded to v6 for Node 24 support
    - name: Set up Python environment
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Run data fetch script
      run: python refresh.py

    - name: Commit and push updated launches.json file
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add launches.json
        git diff-index --quiet HEAD || git commit -m "Automated update of upcoming space launches"
        git push
