name: Daily Space Launch Data Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v5

    - name: Set up Python environment
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    # CRITICAL FIX: Network downloading is handled via native terminal layer
    - name: Download Raw Global Data Stream
      run: |
        curl -L -s -A "SpaceTrackerApp/1.0 (GitHubActions; CoreEngine)" \
        "https://thespacedevs.com" \
        -o raw_launches.json

    - name: Process data structures
      run: python refresh.py

    - name: Commit and push updated launches.json file
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add launches.json
        git diff-index --quiet HEAD || git commit -m "Automated update of global upcoming launches"
        git push

