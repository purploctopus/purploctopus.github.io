name: Daily Space Launch Data Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v5

    # Native path routing prevents the server from issuing an HTML redirect
    - name: Fetch Global Launch Stream
      run: |
        curl -L -s -A "SpaceTrackerApp/1.0" \
        "https://ll.thespacedevs.com/2.3.0/launches/upcoming/?limit=100&mode=detailed&format=json" \
        -o launches.json

    - name: Commit and push updated launches.json file
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add launches.json
        git diff-index --quiet HEAD || git commit -m "Automated update of global upcoming launches"
        git push
