name: Daily Space Launch Data Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v5

    # The exact unspaced live production endpoint targeting 25 global monthly launches
    - name: Fetch Global Launch Stream
      run: |
        curl -L -s -A "SpaceTrackerApp/1.0 (GitHubActions; CoreEngine)" \
        "https://thespacedevs.com" \
        -o launches.json

    - name: Commit and push updated launches.json file
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add launches.json
        git diff-index --quiet HEAD || git commit -m "Automated update of global upcoming launches"
        git push

