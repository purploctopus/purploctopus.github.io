name: Daily Space Launch Data Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v5

    - name: Set up Python environment
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    # Pulls the next 5 global launches across all space agencies with zero security blocks
    - name: Download Unrestricted Global Data Stream
      run: |
        curl -s "https://fdo.rocketlaunch.live/json/launches/next/5" -o raw_launches.json

    - name: Process data structures
      run: python refresh.py

    - name: Commit and push updated launches.json file
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add launches.json
        git diff-index --quiet HEAD || git commit -m "Automated update of global upcoming launches"
        git push

